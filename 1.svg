<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg" style="background-color:#EDF6F9; border-radius:10px;">
  <circle cx="50" cy="50" r="30" fill="#FFD166" />
  <path d="M50 85 L50 110 M20 70 L5 80 M80 70 L95 80" stroke="#FFD166" stroke-width="3"/>
  
  <rect x="0" y="250" width="600" height="50" fill="#006D77" />
  <text x="100" y="280" font-family="Montserrat, sans-serif" fill="white" font-size="14">TIERRA CALIENTE</text>
  <text x="400" y="280" font-family="Montserrat, sans-serif" fill="white" font-size="14">MAR / ZONA FRÍA</text>

  <path d="M150 240 Q 150 150 150 100" stroke="#E29578" stroke-width="4" fill="none" marker-end="url(#arrowRed)"/>
  <text x="160" y="180" font-family="Roboto, sans-serif" fill="#E29578" font-size="12">Aire Caliente Sube</text>
  
  <path d="M150 100 Q 300 100 450 100" stroke="#888" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  
  <path d="M450 100 Q 450 150 450 240" stroke="#006D77" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="460" y="180" font-family="Roboto, sans-serif" fill="#006D77" font-size="12">Aire Frío Baja</text>

  <path d="M420 230 Q 285 230 180 230" stroke="#006D77" stroke-width="6" fill="none" marker-end="url(#arrowWind)"/>
  <text x="250" y="220" font-family="Montserrat, sans-serif" fill="#006D77" font-weight="bold" font-size="18">VIENTO DE SUPERFICIE</text>

  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#E29578" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#006D77" />
    </marker>
    <marker id="arrowWind" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#006D77" />
    </marker>
  </defs>
